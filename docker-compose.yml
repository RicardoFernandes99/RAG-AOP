services:
  app:
    build:
      context: .
    container_name: rag-aop-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-mxbai-embed-large}
      PDF_DIRECTORY: /app/Data
      CHROMA_DB_LOCATION: /app/chroma_langchain_db
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-rag_aop}
      POSTGRES_USER: ${POSTGRES_USER:-rag_aop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_aop}
      DATABASE_URL: postgresql://${POSTGRES_USER:-rag_aop}:${POSTGRES_PASSWORD:-rag_aop}@postgres:5432/${POSTGRES_DB:-rag_aop}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./Data:/app/Data:ro
      - chroma_data:/app/chroma_langchain_db
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: rag-aop-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag_aop}
      POSTGRES_USER: ${POSTGRES_USER:-rag_aop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_aop}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag_aop} -d ${POSTGRES_DB:-rag_aop}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  chroma_data:
  postgres_data:
